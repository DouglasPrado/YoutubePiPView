appId: com.ytview.app
productName: YTView
directories:
  buildResources: build
  output: dist
files:
  - dist/**/*
  - dist-electron/**/*
  - assets/**/*
extraMetadata:
  main: dist-electron/electron-loader.cjs
icon: build/icon.png
mac:
  category: public.app-category.entertainment
  icon: build/icon.png
  target:
    - dmg
    - zip
dmg:
  title: ${productName}-${version}
win:
  icon: build/icon.png
  target:
    - nsis
    - portable
linux:
  icon: build/icon.png
  category: AudioVideo
  target:
    - AppImage
    - deb
